<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mamat Gunshop Arsenal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <header id="header">
      <div id="logo-side">
        <img
          id="header-img"
          src="Resource/Icon.png"
          alt=""
        />
        <h1>Mamat Gunshop Arsenal</h1>
      </div>
      <nav id="nav-bar">
        <ul id="pages">
          <li>
            <a id="nav-link" href="#jumbotron">Features</a>
          </li>
          <li>
            <a id="nav-link" href="#video">How It Works</a>
          </li>
          <li>
            <a id="nav-link" href="#products">Pricing</a>
          </li>
        </ul>
      </nav>
    </header>

    <main>
      <h3 id="jumbotron">TELAH TERBUKA 78 CABANG DI MANCA NEGARA</h3>
      <h4 id="jumbotron">Mari bergabung ke Club Komunitas Mamat Gunshop!</h4>
      <form
        action=""
        target="_blank"
        id="form"
      >
        <input
          id="email"
          type="email"
          placeholder="Enter your email adress"
          required
        />
        <input id="submit" type="submit" value="Get Started" />
      </form>

      <aside>
        <div>
          <img
            id="icons"
            src="https://cdn-icons-png.flaticon.com/128/70/70535.png"
            alt=""
          />
          <h4>Premium Materials</h4>
        </div>

        <div>
          <img
            id="icons"
            src="https://cdn-icons-png.flaticon.com/128/1670/1670915.png"
            alt=""
          />
          <h4>Fast Shipping</h4>
        </div>

        <div>
          <img
            id="icons"
            src="https://cdn-icons-png.flaticon.com/128/5169/5169246.png"
            alt=""
          />
          <h4>Quality Assurance</h4>
        </div>
      </aside>

      <div id="video">
        <iframe
          height="315"
           src="Resource/arie.mp4" 
          frameborder="0"
          allowfullscreen
        ></iframe>
      </div>

      <section id="products">
        <div id="product">
          <div id="productHeader"><h5>AK-47</h5></div>
          <div id="productImg">
            <img
              id="ProductImage"
              src="Resource/AK-47.png"
              alt=""
            />
          </div>
          <div id="productBottom">
            <p>$7999</p>
            <button>Add to cart</button>
          </div>
        </div>

        <div id="product">
          <div id="productHeader">
            <h5>M4A1</h5>
          </div>
          <div id="productImg">
            <img
              id="ProductImage"
              src="Resource/M4A1.png"
              alt=""
            />
          </div>
          <div id="productBottom">
            <p>$5099</p>
            <button>Add to cart</button>
          </div>
        </div>

        <div id="product">
          <div id="productHeader"><h5>Benelli m4</h5></div>
          <div id="productImg">
            <img
              id="ProductImage"
              src="Resource/BenneliM4.png"
              alt=""
            />
          </div>

          <div id="productBottom">
            <p>$5799</p>
            <button>Add to cart</button>
          </div>

          
        </div>
      </section>
    </main>
    <footer>
      <a href="https://www.instagram.com/mamat_alkatiri/">@mamatgunshop</a>
    </footer>
  </body>
</html>
